<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Social Links Profile</title>
  
  <link rel="stylesheet" href="body.css">
</head>
<body>
  <main>
    <article class="profile-card">
      <img src="0056.png" class="avatar">
      
      <h1>David okoi</h1>
      <p class="location">OJODU-BERGER,LAGOS</p>
      <p class="bio">"Front-end developer and 3d artist."</p>

      <ul class="links-list">
        <li><a href="https://github.com/Gamenet419">GitHub</a></li>

      </ul>
    </article>
  </main>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <button id="theme-toggle" class="toggle-btn">Switch Mode</button>
  <script>
  const btn = document.getElementById("theme-toggle");

  btn.addEventListener("click", function() {
    // This "toggles" the light-mode class on and off
    document.body.classList.toggle("light-mode");
    
    // Optional: Change button text
    if (document.body.classList.contains("light-mode")) {
      btn.textContent = "Dark Mode"; 
      btn.textContent = "Light Mode";
    }
  });
  
</script>
</body>
